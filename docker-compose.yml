# ── MLabled ──
# All infrastructure (Postgres, Redis, MinIO) is external.
# Configure via .env file — see .env.example

services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8010}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-mlabled}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@mlabled.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      MINIO_CONSOLE_URL: ${MINIO_CONSOLE_URL:-}
      CORS_ORIGINS: '["*"]'
    restart: unless-stopped

  celery-worker:
    build: ./backend
    command: celery -A app.tasks worker -l info
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-mlabled}
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
