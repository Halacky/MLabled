services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      # Passed to nginx config via env substitution if needed
      MINIO_CONSOLE_URL: ${MINIO_CONSOLE_URL:-http://localhost:9003}
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8010:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mlabled}:${POSTGRES_PASSWORD:-mlabled}@postgres:5432/${POSTGRES_DB:-mlabled}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-mlabled}
      MINIO_CONSOLE_URL: ${MINIO_CONSOLE_URL:-http://localhost:9003}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-openssl-rand}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@mlabled.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery-worker:
    build: ./backend
    command: celery -A app.tasks worker -l info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mlabled}:${POSTGRES_PASSWORD:-mlabled}@postgres:5432/${POSTGRES_DB:-mlabled}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-mlabled}
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mlabled}
      POSTGRES_USER: ${POSTGRES_USER:-mlabled}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlabled}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlabled} -d ${POSTGRES_DB:-mlabled}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6380:6379"
    restart: unless-stopped

  # Built-in MinIO — can be disabled via ENABLE_BUILTIN_MINIO=false in .env
  # When using an external MinIO, set S3_ENDPOINT/S3_ACCESS_KEY/S3_SECRET_KEY in .env
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    profiles:
      - minio
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
