# ── Development: all-in-one (single machine) ──
# For production, use deploy/{infrastructure,backend,frontend}/ separately.

services:
  # ── Infrastructure ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mlabled
      POSTGRES_USER: mlabled
      POSTGRES_PASSWORD: mlabled
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlabled -d mlabled"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6380:6379"
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    restart: unless-stopped

  # ── Backend ──
  backend:
    build: ./backend
    ports:
      - "8010:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mlabled:mlabled@postgres:5432/mlabled
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: mlabled
      MINIO_CONSOLE_URL: http://localhost:9003
      SECRET_KEY: dev-secret-key
      ADMIN_EMAIL: admin@mlabled.local
      ADMIN_PASSWORD: admin
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  celery-worker:
    build: ./backend
    command: celery -A app.tasks worker -l info
    environment:
      DATABASE_URL: postgresql+asyncpg://mlabled:mlabled@postgres:5432/mlabled
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: mlabled
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  # ── Frontend ──
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
